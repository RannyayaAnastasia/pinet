name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-formatting:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: latest

      - name: Check formatting
        run: zig fmt --check src && zig fmt --check build.zig

  test:
    runs-on: ubuntu-latest
    needs: check-formatting

    steps:
      - uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: latest

      - name: Build
        run: zig build

      - name: Build and test
        run: zig build test

      - name: Build and run the default test
        run: zig build run

      - name: Run golden-like test
        run: perl test.pl
